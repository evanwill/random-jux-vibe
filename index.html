<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>random-jux-vibe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f8f8f6;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: #666;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      padding: 1rem;
    }

    .tagline {
      font-size: 1rem;
      color: #555;
      max-width: 30ch;
      line-height: 1.5;
    }

    #juxtapose-btn {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      padding: 0.9rem 2.8rem;
      border: none;
      border-radius: 3rem;
      background: #1a1a1a;
      color: #f8f8f6;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    #juxtapose-btn:hover { background: #333; }
    #juxtapose-btn:active { transform: scale(0.97); }
    #juxtapose-btn:disabled { background: #999; cursor: not-allowed; transform: none; }

    #status {
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2em;
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1rem 2rem;
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
    }

    footer a { color: #888; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #modal.open { display: flex; }

    #modal-box {
      position: relative;
      background: #111;
      border-radius: 0.5rem;
      overflow: hidden;
      width: min(96vw, 900px);
      max-height: 90dvh;
      display: flex;
      flex-direction: column;
    }

    #modal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      background: #1a1a1a;
      color: #ddd;
      font-size: 0.8rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    #modal-labels {
      display: flex;
      gap: 1rem;
      overflow: hidden;
    }

    #modal-labels span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 35ch;
    }

    #close-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.1rem 0.3rem;
      border-radius: 0.2rem;
      flex-shrink: 0;
    }

    #close-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

    #viewer {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    #viewer before-after {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 400px;
    }

    #modal-footer {
      padding: 0.4rem 0.75rem;
      background: #1a1a1a;
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    #modal-footer a {
      font-size: 0.72rem;
      color: #888;
      text-decoration: none;
    }

    #modal-footer a:hover { color: #ccc; text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>random-jux-vibe</h1>
  <p>— wikimedia commons</p>
</header>

<main>
  <p class="tagline">Discover two random images from Wikimedia Commons, side by side.</p>
  <button id="juxtapose-btn">Juxtapose</button>
  <p id="status"></p>
</main>

<footer>
  Images from <a href="https://commons.wikimedia.org/" target="_blank" rel="noopener">Wikimedia Commons</a>
  &middot; Slider: <a href="https://github.com/markpbaggett/before-after" target="_blank" rel="noopener">before-after</a>
</footer>

<!-- Modal -->
<div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-labels">
  <div id="modal-box">
    <div id="modal-toolbar">
      <div id="modal-labels">
        <span id="label-before"></span>
        <span id="label-after" style="color:#888;"></span>
      </div>
      <button id="close-btn" aria-label="Close">&times;</button>
    </div>
    <div id="viewer"></div>
    <div id="modal-footer">
      <a id="link-before" href="#" target="_blank" rel="noopener">Image 1 on Commons &#x2197;</a>
      <a id="link-after" href="#" target="_blank" rel="noopener">Image 2 on Commons &#x2197;</a>
    </div>
  </div>
</div>

<script src="before-after.js"></script>
<script>
  'use strict';

  const btn         = document.getElementById('juxtapose-btn');
  const status      = document.getElementById('status');
  const modal       = document.getElementById('modal');
  const viewer      = document.getElementById('viewer');
  const closeBtn    = document.getElementById('close-btn');
  const labelBefore = document.getElementById('label-before');
  const labelAfter  = document.getElementById('label-after');
  const linkBefore  = document.getElementById('link-before');
  const linkAfter   = document.getElementById('link-after');

  // Accepted image MIME types for the slider
  const ACCEPTED_MIME = new Set(['image/jpeg', 'image/png', 'image/webp', 'image/gif']);

  // Maximum aspect-ratio difference factor to treat two images as "comparable"
  const RATIO_TOLERANCE = 3;

  // Wikimedia Commons API base – origin=* enables CORS for browser requests
  const API = 'https://commons.wikimedia.org/w/api.php';

  /** Fetch a batch of random File-namespace pages with imageinfo in one request */
  async function fetchRandomImages(limit) {
    if (limit === undefined) limit = 30;
    const params = new URLSearchParams({
      action:              'query',
      generator:           'random',
      grnnamespace:        '6',   // File: namespace
      grnlimit:            String(limit),
      prop:                'imageinfo',
      iiprop:              'url|mime|size|extmetadata',
      iiextmetadatafilter: 'ObjectName',
      format:              'json',
      origin:              '*'
    });
    const res = await fetch(API + '?' + params);
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    return Object.values((data.query && data.query.pages) || {});
  }

  /** Pick a human-readable label for a file page */
  function pageLabel(page) {
    const meta = page.imageinfo &&
                 page.imageinfo[0] &&
                 page.imageinfo[0].extmetadata &&
                 page.imageinfo[0].extmetadata.ObjectName &&
                 page.imageinfo[0].extmetadata.ObjectName.value;
    if (meta) return meta;
    return page.title.replace(/^File:/, '').replace(/\.[^.]+$/, '').replace(/_/g, ' ');
  }

  /** Return true if two images have broadly comparable aspect ratios */
  function comparable(infoA, infoB) {
    if (!infoA.width || !infoB.width || !infoA.height || !infoB.height) return true;
    const rA = infoA.width / infoA.height;
    const rB = infoB.width / infoB.height;
    const ratio = Math.max(rA, rB) / Math.min(rA, rB);
    return ratio <= RATIO_TOLERANCE;
  }

  /** Filter pages to usable raster images */
  function validImages(pages) {
    return pages.filter(function(p) {
      var info = p.imageinfo && p.imageinfo[0];
      return info && ACCEPTED_MIME.has(info.mime) && info.width > 100 && info.height > 100;
    });
  }

  /** Pick two images, retrying API fetches as needed */
  async function pickTwo() {
    const MAX_ATTEMPTS = 3;
    for (var attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
      var pages = await fetchRandomImages(30);
      var valid = validImages(pages);
      if (valid.length >= 2) {
        // Sort by aspect ratio, then check adjacent pairs (avoids O(n²) over full list)
        valid.sort(function(a, b) {
          var rA = a.imageinfo[0].width / (a.imageinfo[0].height || 1);
          var rB = b.imageinfo[0].width / (b.imageinfo[0].height || 1);
          return rA - rB;
        });
        for (var i = 0; i < valid.length - 1; i++) {
          if (comparable(valid[i].imageinfo[0], valid[i + 1].imageinfo[0])) {
            return [valid[i], valid[i + 1]];
          }
        }
        // Fall back to any two
        return [valid[0], valid[1]];
      }
    }
    throw new Error('Could not find two suitable images. Please try again.');
  }

  /** Build a Commons page URL from a file title */
  function commonsPageUrl(title) {
    return 'https://commons.wikimedia.org/wiki/' + encodeURIComponent(title.replace(/ /g, '_'));
  }

  /** Populate and open the modal with two image pages */
  function showModal(pageA, pageB) {
    var infoA = pageA.imageinfo[0];
    var infoB = pageB.imageinfo[0];

    labelBefore.textContent = pageLabel(pageA);
    labelAfter.textContent  = '/ ' + pageLabel(pageB);
    linkBefore.href = commonsPageUrl(pageA.title);
    linkAfter.href  = commonsPageUrl(pageB.title);

    while (viewer.firstChild) viewer.removeChild(viewer.firstChild);

    var el = document.createElement('before-after');
    el.setAttribute('before',       infoA.url);
    el.setAttribute('after',        infoB.url);
    el.setAttribute('before-label', pageLabel(pageA));
    el.setAttribute('after-label',  pageLabel(pageB));
    el.setAttribute('start-position', '50');
    viewer.appendChild(el);

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    while (viewer.firstChild) viewer.removeChild(viewer.firstChild);
    btn.focus();
  }

  async function handleJuxtapose() {
    btn.disabled = true;
    status.textContent = 'Finding random images\u2026';
    try {
      var pair = await pickTwo();
      status.textContent = '';
      showModal(pair[0], pair[1]);
    } catch (err) {
      status.textContent = err.message || 'Something went wrong. Please try again.';
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', handleJuxtapose);
  closeBtn.addEventListener('click', closeModal);

  // Close on backdrop click
  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeModal();
  });

  // Close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });
</script>
</body>
</html>
