<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>random-jux-vibe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f8f8f6;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: #666;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      padding: 1rem;
    }

    .tagline {
      font-size: 1rem;
      color: #555;
      max-width: 30ch;
      line-height: 1.5;
    }

    #juxtapose-btn {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      padding: 0.9rem 2.8rem;
      border: none;
      border-radius: 3rem;
      background: #1a1a1a;
      color: #f8f8f6;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    #juxtapose-btn:hover { background: #333; }
    #juxtapose-btn:active { transform: scale(0.97); }
    #juxtapose-btn:disabled { background: #999; cursor: not-allowed; transform: none; }

    #status {
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2em;
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1rem 2rem;
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
    }

    footer a { color: #888; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #modal.open { display: flex; }

    #modal-box {
      position: relative;
      background: #111;
      border-radius: 0.5rem;
      overflow: hidden;
      width: 95vw;
      height: 95vh;
      display: flex;
      flex-direction: column;
    }

    #modal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      background: #1a1a1a;
      color: #ddd;
      font-size: 0.8rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    #modal-labels {
      display: flex;
      gap: 1rem;
      overflow: hidden;
    }

    #modal-labels span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 35ch;
    }

    #close-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.1rem 0.3rem;
      border-radius: 0.2rem;
      flex-shrink: 0;
    }

    #close-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

    #viewer {
      flex: 1;
      height: 100%;
      position: relative;
    }

    #viewer before-after {
      display: block;
      width: 95vw;
      height: 100%;
      min-height: 400px;
    }

    #modal-footer {
      padding: 0.4rem 0.75rem;
      background: #1a1a1a;
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    #modal-footer a {
      font-size: 0.72rem;
      color: #888;
      text-decoration: none;
    }

    #modal-footer a:hover { color: #ccc; text-decoration: underline; }

    /* Loading spinner – shown in #viewer while images are fetching/loading */
    #loading-spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      z-index: 20;
    }

    /* Animated ring drawn with a CSS pseudo-element – no extra markup needed */
    #loading-spinner::after {
      content: '';
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.18);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>random-jux-vibe</h1>
  <p>— wikimedia commons</p>
</header>

<main>
  <p class="tagline">Discover two random images from Wikimedia Commons, side by side.</p>
  <button id="juxtapose-btn">Juxtapose</button>
  <p id="status"></p>
</main>

<footer>
  Images from <a href="https://commons.wikimedia.org/" target="_blank" rel="noopener">Wikimedia Commons</a>
  &middot; Slider: <a href="https://github.com/markpbaggett/before-after" target="_blank" rel="noopener">before-after</a>
</footer>

<!-- Modal -->
<div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-labels">
  <div id="modal-box">
    <div id="modal-toolbar">
      <div id="modal-labels">
        <span id="label-before"></span>
        <span id="label-after" style="color:#888;"></span>
      </div>
      <button id="close-btn" aria-label="Close">&times;</button>
    </div>
    <div id="viewer"></div>
    <div id="modal-footer">
      <a id="link-before" href="#" target="_blank" rel="noopener">Image 1 on Commons &#x2197;</a>
      <a id="link-after" href="#" target="_blank" rel="noopener">Image 2 on Commons &#x2197;</a>
    </div>
  </div>
</div>

<script>
  'use strict';

  /* ===================================================================
   * BeforeAfter web component
   * Defines <before-after> for side-by-side image comparison with a
   * draggable divider.  Dispatches a custom "images-loaded" event on
   * itself once both the before and after images have finished loading.
   * =================================================================== */
  (function () {
    'use strict';

    const CSS = `
      :host {
        display: block;
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 400px;
      }

      .before-after-container {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: ew-resize;
        user-select: none;
        touch-action: none;
        background-color: #f0f0f0;
      }

      .before-after-container.vertical { cursor: ns-resize; }

      .before-after-image-container {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      /* Images start invisible and fade in once loaded */
      .before-after-image {
        width: 100%; height: 100%;
        object-fit: contain;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .before-after-image.loaded { opacity: 1; }

      .before-after-before-container { z-index: 2; }

      .before-after-slider {
        position: absolute;
        top: 0; bottom: 0;
        width: 4px;
        transform: translateX(-50%);
        z-index: 10;
        cursor: ew-resize;
      }
      .before-after-slider.vertical {
        left: 0; right: 0;
        top: auto; bottom: auto;
        width: auto; height: 4px;
        transform: translateY(-50%);
        cursor: ns-resize;
      }

      .before-after-slider-line {
        position: absolute;
        top: 0; bottom: 0; left: 50%;
        width: 2px;
        background-color: white;
        transform: translateX(-50%);
        box-shadow: 0 0 8px rgba(0,0,0,0.5);
      }
      .before-after-slider.vertical .before-after-slider-line {
        left: 0; right: 0; top: 50%; bottom: auto;
        width: auto; height: 2px;
        transform: translateY(-50%);
      }

      .before-after-slider-button {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 48px; height: 48px;
        border-radius: 50%;
        border: 2px solid white;
        background-color: rgba(0,0,0,0.8);
        color: white;
        cursor: ew-resize;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 12px rgba(0,0,0,0.5);
        transition: all 0.2s ease;
        padding: 0;
        outline: none;
      }
      .before-after-slider.vertical .before-after-slider-button { cursor: ns-resize; }
      .before-after-slider-button:hover {
        background-color: rgba(0,0,0,0.95);
        transform: translate(-50%, -50%) scale(1.1);
      }
      .before-after-slider-button:active { transform: translate(-50%, -50%) scale(0.95); }
      .before-after-slider-button svg { width: 24px; height: 24px; }

      .before-after-label {
        position: absolute;
        top: 1rem;
        padding: 0.5rem 1rem;
        background-color: rgba(0,0,0,0.75);
        color: white;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 4px;
        pointer-events: none;
        z-index: 2;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        transition: opacity 0.2s ease;
      }
      .before-after-label.before  { left: 1rem; }
      .before-after-label.after   { right: 1rem; }
      .vertical .before-after-label.before { left: auto; right: auto; top: 1rem; }
      .vertical .before-after-label.after  { left: auto; right: auto; top: auto; bottom: 1rem; }
    `;

    class BeforeAfter extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this.sliderPosition = 50;
        this.isDragging = false;
        // Tracks whether each image has fired its "load" event
        this.imagesLoaded = { before: false, after: false };
      }

      static get observedAttributes() {
        return ['before', 'after', 'before-label', 'after-label', 'start-position', 'show-labels', 'orientation'];
      }

      connectedCallback()  { this.render(); this.attachEvents(); }
      disconnectedCallback() { this.cleanup(); }

      attributeChangedCallback(name, oldValue, newValue) {
        if (oldValue !== newValue && this.shadowRoot.querySelector('.before-after-container')) {
          this.render();
        }
      }

      get beforeImage()    { return this.getAttribute('before') || ''; }
      get afterImage()     { return this.getAttribute('after')  || ''; }
      get beforeLabel()    { return this.getAttribute('before-label') || 'Before'; }
      get afterLabel()     { return this.getAttribute('after-label')  || 'After'; }
      get startPosition()  { return parseFloat(this.getAttribute('start-position') || '50'); }
      get showLabels()     { return this.getAttribute('show-labels') !== 'false'; }
      get orientation()    { return (this.getAttribute('orientation') || '') === 'vertical' ? 'vertical' : 'horizontal'; }
      get isVertical()     { return this.orientation === 'vertical'; }

      render() {
        const style = document.createElement('style');
        style.textContent = CSS;

        this.container = document.createElement('div');
        this.container.className = this.isVertical ? 'before-after-container vertical' : 'before-after-container';
        this.container.setAttribute('role', 'group');
        this.container.setAttribute('aria-label', `Image comparison: ${this.beforeLabel} and ${this.afterLabel}`);

        this.afterContainer  = this.createImageContainer('after');
        this.container.appendChild(this.afterContainer);

        this.beforeContainer = this.createImageContainer('before');
        this.beforeContainer.classList.add('before-after-before-container');
        this.container.appendChild(this.beforeContainer);

        this.slider = this.createSlider();
        this.container.appendChild(this.slider);

        // Reset loaded state whenever we re-render with new images
        this.imagesLoaded = { before: false, after: false };

        this.shadowRoot.innerHTML = '';
        this.shadowRoot.appendChild(style);
        this.shadowRoot.appendChild(this.container);

        this.sliderPosition = this.startPosition;
        this.updateSliderPosition(this.sliderPosition);
      }

      createImageContainer(type) {
        const container = document.createElement('div');
        container.className = 'before-after-image-container';

        const img = document.createElement('img');
        img.className = 'before-after-image';
        img.src = type === 'before' ? this.beforeImage : this.afterImage;
        img.alt = type === 'before' ? this.beforeLabel : this.afterLabel;

        img.addEventListener('load', () => {
          img.classList.add('loaded');
          this.imagesLoaded[type] = true;
          // Once both images have loaded, notify the outside world
          if (this.imagesLoaded.before && this.imagesLoaded.after) {
            this.dispatchEvent(new CustomEvent('images-loaded', { bubbles: true }));
          }
        });

        // Treat a broken image the same as loaded so the spinner never hangs
        img.addEventListener('error', () => {
          this.imagesLoaded[type] = true;
          if (this.imagesLoaded.before && this.imagesLoaded.after) {
            this.dispatchEvent(new CustomEvent('images-loaded', { bubbles: true }));
          }
        });

        container.appendChild(img);

        if (this.showLabels) {
          const label = document.createElement('div');
          label.className = `before-after-label ${type}`;
          label.textContent = type === 'before' ? this.beforeLabel : this.afterLabel;
          if (type === 'before') { this.beforeLabelEl = label; }
          else                   { this.afterLabelEl  = label; }
          container.appendChild(label);
        }

        return container;
      }

      createSlider() {
        const slider = document.createElement('div');
        slider.className = this.isVertical ? 'before-after-slider vertical' : 'before-after-slider';
        slider.setAttribute('role', 'slider');
        slider.setAttribute('aria-label', 'Image comparison slider');
        slider.setAttribute('aria-valuemin', '0');
        slider.setAttribute('aria-valuemax', '100');
        slider.setAttribute('aria-valuenow', this.sliderPosition.toString());
        slider.setAttribute('aria-valuetext', `${Math.round(this.sliderPosition)}% revealed`);
        slider.setAttribute('tabindex', '0');

        const line = document.createElement('div');
        line.className = 'before-after-slider-line';
        slider.appendChild(line);

        const button = document.createElement('button');
        button.className = 'before-after-slider-button';
        button.setAttribute('aria-label', 'Drag to compare images');
        button.setAttribute('tabindex', '-1');

        const icon = this.isVertical ? `
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M18 15l-6-6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>` : `
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>`;
        button.innerHTML = icon;
        slider.appendChild(button);

        return slider;
      }

      attachEvents() {
        this.boundMouseMove = this.handleMouseMove.bind(this);
        this.boundMouseUp   = this.handleMouseUp.bind(this);
        this.boundTouchMove = this.handleTouchMove.bind(this);
        this.boundTouchEnd  = this.handleTouchEnd.bind(this);
        this.boundKeyDown   = this.handleKeyDown.bind(this);

        this.slider.addEventListener('mousedown',  this.handleMouseDown.bind(this));
        this.slider.addEventListener('touchstart', this.handleTouchStart.bind(this));
        this.slider.addEventListener('keydown',    this.boundKeyDown);
      }

      handleMouseDown(e) {
        e.preventDefault();
        this.isDragging = true;
        this.updatePosition(this.isVertical ? e.clientY : e.clientX);
        document.addEventListener('mousemove', this.boundMouseMove);
        document.addEventListener('mouseup',   this.boundMouseUp);
      }

      handleMouseMove(e) {
        if (!this.isDragging) return;
        this.updatePosition(this.isVertical ? e.clientY : e.clientX);
      }

      handleMouseUp() {
        this.isDragging = false;
        document.removeEventListener('mousemove', this.boundMouseMove);
        document.removeEventListener('mouseup',   this.boundMouseUp);
      }

      handleTouchStart(e) {
        this.isDragging = true;
        this.updatePosition(this.isVertical ? e.touches[0].clientY : e.touches[0].clientX);
        document.addEventListener('touchmove', this.boundTouchMove, { passive: false });
        document.addEventListener('touchend',  this.boundTouchEnd);
      }

      handleTouchMove(e) {
        if (!this.isDragging) return;
        e.preventDefault();
        this.updatePosition(this.isVertical ? e.touches[0].clientY : e.touches[0].clientX);
      }

      handleTouchEnd() {
        this.isDragging = false;
        document.removeEventListener('touchmove', this.boundTouchMove);
        document.removeEventListener('touchend',  this.boundTouchEnd);
      }

      handleKeyDown(e) {
        let pos = this.sliderPosition;
        const step = e.shiftKey ? 10 : 1;
        if (this.isVertical) {
          if      (e.key === 'ArrowUp'   || e.key === 'Up')   { e.preventDefault(); pos = Math.max(0,   pos - step); }
          else if (e.key === 'ArrowDown' || e.key === 'Down') { e.preventDefault(); pos = Math.min(100, pos + step); }
          else if (e.key === 'Home') { e.preventDefault(); pos = 0; }
          else if (e.key === 'End')  { e.preventDefault(); pos = 100; }
          else return;
        } else {
          if      (e.key === 'ArrowLeft'  || e.key === 'Left')  { e.preventDefault(); pos = Math.max(0,   pos - step); }
          else if (e.key === 'ArrowRight' || e.key === 'Right') { e.preventDefault(); pos = Math.min(100, pos + step); }
          else if (e.key === 'Home') { e.preventDefault(); pos = 0; }
          else if (e.key === 'End')  { e.preventDefault(); pos = 100; }
          else return;
        }
        this.updateSliderPosition(pos);
      }

      updatePosition(coord) {
        const rect = this.container.getBoundingClientRect();
        const percentage = this.isVertical
          ? Math.max(0, Math.min(100, ((coord - rect.top)  / rect.height) * 100))
          : Math.max(0, Math.min(100, ((coord - rect.left) / rect.width)  * 100));
        this.updateSliderPosition(percentage);
      }

      updateSliderPosition(percentage) {
        this.sliderPosition = percentage;
        if (this.isVertical) {
          this.slider.style.top = `${percentage}%`;
          this.beforeContainer.style.clipPath = `inset(0 0 ${100 - percentage}% 0)`;
        } else {
          this.slider.style.left = `${percentage}%`;
          this.beforeContainer.style.clipPath = `inset(0 ${100 - percentage}% 0 0)`;
        }
        this.slider.setAttribute('aria-valuenow',  percentage.toString());
        this.slider.setAttribute('aria-valuetext', `${Math.round(percentage)}% revealed`);
        // Hide label when it would be mostly clipped
        if (this.beforeLabelEl) { this.beforeLabelEl.style.opacity = percentage < 15 ? '0' : '1'; }
        if (this.afterLabelEl)  { this.afterLabelEl.style.opacity  = percentage > 85 ? '0' : '1'; }
      }

      cleanup() {
        document.removeEventListener('mousemove', this.boundMouseMove);
        document.removeEventListener('mouseup',   this.boundMouseUp);
        document.removeEventListener('touchmove', this.boundTouchMove);
        document.removeEventListener('touchend',  this.boundTouchEnd);
      }
    }

    if (!customElements.get('before-after')) {
      customElements.define('before-after', BeforeAfter);
    }
  }());

  /* ===================================================================
   * Main application
   * =================================================================== */

  const btn         = document.getElementById('juxtapose-btn');
  const status      = document.getElementById('status');
  const modal       = document.getElementById('modal');
  const viewer      = document.getElementById('viewer');
  const closeBtn    = document.getElementById('close-btn');
  const labelBefore = document.getElementById('label-before');
  const labelAfter  = document.getElementById('label-after');
  const linkBefore  = document.getElementById('link-before');
  const linkAfter   = document.getElementById('link-after');

  // Accepted image MIME types for the slider
  const ACCEPTED_MIME = new Set(['image/jpeg', 'image/png', 'image/webp', 'image/gif']);

  // Maximum aspect-ratio difference factor to treat two images as "comparable"
  const RATIO_TOLERANCE = 3;

  // Wikimedia Commons API base – origin=* enables CORS for browser requests
  const API = 'https://commons.wikimedia.org/w/api.php';

  /** Fetch a batch of random File-namespace pages with imageinfo in one request */
  async function fetchRandomImages(limit) {
    if (limit === undefined) limit = 30;
    const params = new URLSearchParams({
      action:              'query',
      generator:           'random',
      grnnamespace:        '6',   // File: namespace
      grnlimit:            String(limit),
      prop:                'imageinfo',
      iiprop:              'url|mime|size|extmetadata',
      iiextmetadatafilter: 'ObjectName',
      format:              'json',
      origin:              '*'
    });
    const res = await fetch(API + '?' + params);
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    return Object.values((data.query && data.query.pages) || {});
  }

  /** Pick a human-readable label for a file page */
  function stripHtml(value) {
    const parsed = new DOMParser().parseFromString(String(value), 'text/html');
    return ((parsed.body && parsed.body.textContent) || '').replace(/\s+/g, ' ').trim();
  }

  function pageLabel(page) {
    const meta = page.imageinfo &&
                 page.imageinfo[0] &&
                 page.imageinfo[0].extmetadata &&
                 page.imageinfo[0].extmetadata.ObjectName &&
                 page.imageinfo[0].extmetadata.ObjectName.value;
    if (meta) {
      const cleanMeta = stripHtml(meta);
      if (cleanMeta) return cleanMeta;
    }
    return page.title.replace(/^File:/, '').replace(/\.[^.]+$/, '').replace(/_/g, ' ');
  }

  /** Return true if two images have broadly comparable aspect ratios */
  function comparable(infoA, infoB) {
    if (!infoA.width || !infoB.width || !infoA.height || !infoB.height) return true;
    const rA = infoA.width / infoA.height;
    const rB = infoB.width / infoB.height;
    const ratio = Math.max(rA, rB) / Math.min(rA, rB);
    return ratio <= RATIO_TOLERANCE;
  }

  /** Filter pages to usable raster images */
  function validImages(pages) {
    return pages.filter(function(p) {
      var info = p.imageinfo && p.imageinfo[0];
      return info && ACCEPTED_MIME.has(info.mime) && info.width > 100 && info.height > 100;
    });
  }

  /** Pick two images, retrying API fetches as needed */
  async function pickTwo() {
    const MAX_ATTEMPTS = 3;
    for (var attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
      var pages = await fetchRandomImages(30);
      var valid = validImages(pages);
      if (valid.length >= 2) {
        // Sort by aspect ratio, then check adjacent pairs (avoids O(n²) over full list)
        valid.sort(function(a, b) {
          var rA = a.imageinfo[0].width / (a.imageinfo[0].height || 1);
          var rB = b.imageinfo[0].width / (b.imageinfo[0].height || 1);
          return rA - rB;
        });
        for (var i = 0; i < valid.length - 1; i++) {
          if (comparable(valid[i].imageinfo[0], valid[i + 1].imageinfo[0])) {
            return [valid[i], valid[i + 1]];
          }
        }
        // Fall back to any two
        return [valid[0], valid[1]];
      }
    }
    throw new Error('Could not find two suitable images. Please try again.');
  }

  /** Build a Commons page URL from a file title */
  function commonsPageUrl(title) {
    return 'https://commons.wikimedia.org/wiki/' + encodeURIComponent(title.replace(/ /g, '_'));
  }

  /** Populate and open the modal with two image pages */
  function showModal(pageA, pageB) {
    var infoA = pageA.imageinfo[0];
    var infoB = pageB.imageinfo[0];

    labelBefore.textContent = pageLabel(pageA);
    labelAfter.textContent  = '/ ' + pageLabel(pageB);
    linkBefore.href = commonsPageUrl(pageA.title);
    linkAfter.href  = commonsPageUrl(pageB.title);

    while (viewer.firstChild) viewer.removeChild(viewer.firstChild);

    // Show a loading spinner while the images fetch and decode
    const spinner = document.createElement('div');
    spinner.id = 'loading-spinner';
    viewer.appendChild(spinner);

    const el = document.createElement('before-after');
    el.setAttribute('before',         infoA.url);
    el.setAttribute('after',          infoB.url);
    el.setAttribute('before-label',   pageLabel(pageA));
    el.setAttribute('after-label',    pageLabel(pageB));
    el.setAttribute('start-position', '50');

    // Remove the spinner once both images have finished loading
    el.addEventListener('images-loaded', function () {
      spinner.remove();
    });

    viewer.appendChild(el);

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    while (viewer.firstChild) viewer.removeChild(viewer.firstChild);
    btn.focus();
  }

  async function handleJuxtapose() {
    btn.disabled = true;
    status.textContent = 'Finding random images\u2026';
    try {
      var pair = await pickTwo();
      status.textContent = '';
      showModal(pair[0], pair[1]);
    } catch (err) {
      status.textContent = err.message || 'Something went wrong. Please try again.';
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', handleJuxtapose);
  closeBtn.addEventListener('click', closeModal);

  // Close on backdrop click
  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeModal();
  });

  // Close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });
</script>
</body>
</html>
